<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Cadastro de Clientes</title>

    <!-- Semantic UI -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/semantic-ui/2.5.0/semantic.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/semantic-ui/2.5.0/semantic.min.js"></script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="app.css">

</head>

<body class="bg-custom" style="display: flex; flex-direction: column; min-height: 100vh; margin:0;">

<!-- CONTEÚDO PRINCIPAL -->
<div style="flex: 1; padding:20px;">

    <div class="ui container; card-custom">

        <h2 class="ui dividing header">
            <i class="users icon"></i>
            Cadastro de Clientes
        </h2>

        <form class="ui form">

            <div class="two fields">

                <div class="field">
                    <label>Nome</label>
                    <input type="text" id="nome">
                </div>

                <div class="field">
                    <label>CPF</label>
                    <input type="text" id="cpf">
                </div>

            </div>

            <div class="two fields">

                <div class="field">
                    <label>Telefone</label>
                    <input type="text" id="telefone">
                </div>

                <div class="field">
                    <label>Cidade</label>
                    <input type="text" id="cidade">
                </div>

            </div>

            <div class="two fields">

                <div class="field">
                    <label>Endereço</label>
                    <input type="text" id="endereco">
                </div>

                <div class="field">
                    <label>Data de Nascimento</label>
                    <input type="date" id="nascimento">
                </div>

            </div>

            <button class="ui fluid green button" type="button" onclick="salvar()">
                Salvar Cliente
            </button>

        </form>

        <h3 class="ui dividing header">Clientes Cadastrados</h3>

        <table class="ui striped celled table">

            <thead>
            <tr>
                <th>Nome</th>
                <th>CPF</th>
                <th>Telefone</th>
                <th>Cidade</th>
                <th>Endereço</th>
                <th>Nascimento</th>
                <th>Ações</th>
            </tr>
            </thead>

            <tbody id="listaclientes"></tbody>

        </table>

    </div>
</div>

<script>

    const firebaseConfig = {
      apiKey: "AIzaSyBpthlv2dESax-iwHW-TXybY0rwG_Tsglg",
      authDomain: "crud-d2d0d.firebaseapp.com",
      databaseURL: "https://crud-d2d0d-default-rtdb.firebaseio.com",
      projectId: "crud-d2d0d",
      storageBucket: "crud-d2d0d.firebasestorage.app",
      messagingSenderId: "980187177310",
      appId: "1:980187177310:web:847b9cd12428562690efcf"
    };

    firebase.initializeApp(firebaseConfig);

    const db = firebase.database();

    // LISTAR CLIENTES
    db.ref("clientes").on("value", snapshot => {

      let tabela = document.getElementById("listaclientes");
      tabela.innerHTML = "";

      snapshot.forEach(item => {
        let dados = item.val();
        let id = item.key;

        tabela.innerHTML += `
          <tr>
            <td>${dados.nome}</td>
            <td>${dados.cpf}</td>
            <td>${dados.telefone}</td>
            <td>${dados.cidade}</td>
            <td>${dados.endereco}</td>
            <td>${dados.nascimento}</td>
            <td>
              <button class="ui mini blue button" onclick="editar('${id}', ${JSON.stringify(dados).replace(/"/g, '&quot;')})">
                Editar
              </button>
              <button class="ui mini red button" onclick="excluir('${id}')">
                Excluir
              </button>
            </td>
          </tr>
        `;
      });

    });

    // SALVAR
    function salvar(){
      let nome = document.getElementById("nome").value;
      let cpf = document.getElementById("cpf").value;
      let telefone = document.getElementById("telefone").value;
      let cidade = document.getElementById("cidade").value;
      let endereco = document.getElementById("endereco").value;
      let nascimento = document.getElementById("nascimento").value;

      if(!nome || !cpf) {
        alert("Preencha pelo menos Nome e CPF!");
        return;
      }

      db.ref("clientes").push({
        nome, cpf, telefone, cidade, endereco, nascimento
      }).then(() => {
        alert("Cliente salvo com sucesso!");

        document.getElementById("nome").value = "";
        document.getElementById("cpf").value = "";
        document.getElementById("telefone").value = "";
        document.getElementById("cidade").value = "";
        document.getElementById("endereco").value = "";
        document.getElementById("nascimento").value = "";

      }).catch(e => {
        alert("Erro ao salvar: " + e.message);
      });
    }

    // EDITAR
    function editar(id, dados) {

      let nome = prompt("Nome:", dados.nome);
      if(nome === null) return;

      let cpf = prompt("CPF:", dados.cpf);
      if(cpf === null) return;

      let telefone = prompt("Telefone:", dados.telefone);
      if(telefone === null) return;

      let cidade = prompt("Cidade:", dados.cidade);
      if(cidade === null) return;

      let endereco = prompt("Endereço:", dados.endereco);
      if(endereco === null) return;

      let nascimento = prompt("Data de Nascimento:", dados.nascimento);
      if(nascimento === null) return;

      db.ref("clientes/" + id).update({
        nome, cpf, telefone, cidade, endereco, nascimento
      }).then(() => {
        alert("Cliente atualizado!");
      }).catch(e => {
        alert("Erro ao atualizar: " + e.message);
      });
    }

    // EXCLUIR
    function excluir(id) {
      if(confirm("Deseja excluir este cliente?")) {
        db.ref("clientes/" + id).remove().then(() => {
          alert("Cliente excluído!");
        }).catch(e => {
          alert("Erro ao excluir: " + e.message);
        });
      }
    }

</script>

</footer>

</body>
</html>
